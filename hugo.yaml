  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: Digital Behaviourism
        content: A theoretical framework that conceptualises digital technology use as operant behaviour.
        image: /images/projects/digital-behaviourism.png
        featured:
          name: Pre-print
          link: https://osf.io/preprints/psyarxiv/ztev4_v2
        badges:
          - "Topics"
          - "Theory"
          - "Pre-print"

      - title: Functions of TikTok Use
        content: A project that examines why people use TikTok by analysing the behavioural functions that drive each session and how these relate to changes in affect.
        image: /images/projects/tiktok-functions.png
        badges:
          - "Empirical"
          - "Pre-print"

      - title: Cross-sector Work
        content: A Delphi study and World Café project that brought together experts from major game studios, international policy bodies, NGOs, research funders, and academia to examine how divergent incentives and institutional constraints create coordination challenges in the field of video games.
        image: /images/projects/cross-sector.png
        featured:
          name: Pre-print
          link: https://osf.io/preprints/psyarxiv/w3pyn_v2
        badges:
