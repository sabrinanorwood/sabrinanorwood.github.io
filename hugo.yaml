baseURL: "https://sabrinanorwood.github.io/"
languageCode: "en-us"
title: "Sabrina Norwood, PhD"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
  #googleAnalytics:
    #id: G-MEASUREMENT_ID
  #disqus:
    #shortname: your-disqus-shortname

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
    #Dropdown menu
    # - identifier: dropdown
    #   title: Example dropdown menu
